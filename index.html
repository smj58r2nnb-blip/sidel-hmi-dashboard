<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidel HMI Pro Industrial</title>
    <style>
        :root {
            --bg-main: #2b3e50;
            --panel-bg: #4fb2e8;
            --panel-inner: #d4e8f9;
            --header-bg: linear-gradient(to bottom, #4a77a8, #2b4f76);
            --lamp-3000: #ffea00;
            --lamp-2500: #ff7700;
            --lamp-off: #ffffff;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-main); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--header-bg); color: white; padding: 10px 20px; font-size: 1.2rem; font-weight: bold; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #1a3450; }
        .hmi-layout { display: flex; flex-direction: column; gap: 20px; margin-top: 30px; background-color: var(--panel-bg); padding: 20px; border-radius: 8px; box-shadow: inset 2px 2px 10px rgba(255,255,255,0.4), 0 5px 15px rgba(0,0,0,0.4); }
        .grid-container { display: grid; grid-template-columns: 30px repeat(16, 1fr) 45px; gap: 5px; align-items: center; position: relative; }
        .bg-penetration { grid-row: 1 / span 10; background-color: #6a95c2; margin: -5px -2.5px; z-index: 0; border-radius: 4px 0 0 4px; }
        .bg-distribution { grid-row: 1 / span 10; background-color: #8eb5db; margin: -5px -2.5px; z-index: 0; border-radius: 0 4px 4px 0; }
        .lamp { z-index: 1; height: 12px; border: 1px solid #555; border-radius: 2px; }
        .on-3000 { background-color: var(--lamp-3000); box-shadow: 0 0 5px var(--lamp-3000); }
        .on-2500 { background-color: var(--lamp-2500); box-shadow: 0 0 5px var(--lamp-2500); }
        .off { background-color: var(--lamp-off); }
    </style>
</head>
<body>
    <header><div>SIDEL HMI PRO</div><div id="recipeName">No File Loaded</div></header>
    <div class="upload-area"><input type="file" id="fileInput" onchange="loadFile()" /></div>
    <div id="hmiContainer" class="main-content"></div>

    <script>
        let recipeData = {};

        function loadFile() {
            const file = document.getElementById('fileInput').files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                // ... (Parsing logic from previous step)
                renderVisualHMI();
            };
            reader.readAsArrayBuffer(file);
        }

        function renderVisualHMI() {
            const container = document.getElementById('hmiContainer');
            container.innerHTML = `<div class="hmi-layout"><div class="grid-container" id="grid"></div></div>`;
            const grid = document.getElementById('grid');

            // Draw Background Splits (Penetration/Distribution)
            grid.innerHTML += `<div class="bg-penetration" style="grid-column: 2 / span 8;"></div>`;
            grid.innerHTML += `<div class="bg-distribution" style="grid-column: 10 / span 8;"></div>`;

            // Draw Matrix
            for (let z = 9; z >= 1; z--) {
                grid.innerHTML += `<div class="grid-row-label">${z}</div>`;
                for (let o = 1; o <= 16; o++) {
                    // Logic: Get power rating for this specific lamp socket from PositionLampe
                    let powerRating = findTagVal(`PositionLampe${z+1}[${o-1}]`); 
                    let isActive = checkLampActive(z, o);
                    
                    let className = 'off';
                    if (isActive) {
                        className = (powerRating == "3000") ? 'on-3000' : 'on-2500';
                    }
                    grid.innerHTML += `<div class="lamp ${className}"></div>`;
                }
                grid.innerHTML += `<div></div>`;
            }
        }

        function checkLampActive(z, o) {
            let mask = parseInt(findTagVal(`RetourEtatLampeFour${o}`), 10);
            return (mask & (1 << (z - 1))) !== 0;
        }

        // Helper: Find value by section-independent search
        function findTagVal(tag) { /* ... same as previous ... */ }
    </script>
</body>
</html>
