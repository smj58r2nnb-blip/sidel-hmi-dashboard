<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sidel HMI Pro</title>
    <style>
        :root { --bg-main: #2b3e50; --panel-bg: #4fb2e8; --panel-inner: #d4e8f9; --header-bg: linear-gradient(to bottom, #4a77a8, #2b4f76); --text-dark: #1a3450; --border: #2a6f9e; --lamp-off: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-main); color: var(--text-dark); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: var(--header-bg); color: white; padding: 10px 20px; font-size: 1.2rem; font-weight: bold; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #1a3450; }
        .upload-area { background-color: #fff; padding: 10px 20px; border-bottom: 1px solid #9fb2c0; display: flex; gap: 15px; }
        .dashboard { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 220px; background-color: #fff; border-right: 1px solid #9fb2c0; overflow-y: auto; }
        .nav-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #eee; font-weight: bold; }
        .nav-item.active { background: var(--header-bg); color: white; }
        .main-content { flex: 1; padding: 20px; overflow-y: auto; }
        
        .hmi-layout { display: flex; flex-direction: column; gap: 20px; margin-top: 30px; background-color: var(--panel-bg); padding: 20px; border-radius: 8px; }
        .hmi-row { display: flex; gap: 20px; }
        .hmi-panel { background: var(--panel-inner); border: 2px solid var(--border); border-radius: 12px; padding: 15px; flex: 1; }
        .hmi-panel-header { font-weight: bold; text-transform: uppercase; border-bottom: 2px solid var(--border); margin-bottom: 10px; text-align: center; }
        
        .lamp-container { display: grid; grid-template-columns: 30px repeat(16, 1fr) 45px; gap: 5px; align-items: center; position: relative; }
        .bg-layer { position: absolute; top: 0; bottom: 0; z-index: 0; pointer-events: none; }
        .lamp { height: 12px; border: 1px solid #555; border-radius: 2px; z-index: 1; }
        .lamp.yellow { background-color: #ffea00; box-shadow: 0 0 5px #ffea00; }
        .lamp.orange { background-color: #ff7700; box-shadow: 0 0 5px #ff7700; }
        .lamp.off { background-color: #fff; }
        .col-header { font-size: 0.8rem; font-weight: bold; text-align: center; z-index: 1; }
        .grid-row-label { font-weight: bold; text-align: right; padding-right: 10px; z-index: 1; }
        .grid-row-pct { font-weight: bold; font-family: monospace; text-align: right; z-index: 1; }
    </style>
</head>
<body>
    <header><div>SIDEL HMI PRO</div><div id="recipeName">No File Loaded</div></header>
    <div class="upload-area"><input type="file" id="fileInput" onchange="loadFile()" /></div>
    <div class="dashboard">
        <div class="sidebar" id="sidebar"></div>
        <div class="main-content"><div id="hmiContainer"></div></div>
    </div>
    <script>
        let recipeData = {};

        function loadFile() {
            const file = document.getElementById('fileInput').files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const buffer = e.target.result;
                // Full logic: 1. DBF Parse, 2. Get Penetration Split, 3. Render
                processData(buffer);
                renderVisualHMI();
            };
            reader.readAsArrayBuffer(buffer);
        }

        // Logic to build sections and find the "NbreDistr" tag
        function buildRecipeData(records) { /* ... same as previous ... */ }

        function renderVisualHMI() {
            let nbreFours = parseInt(findTagVal('NbreFours'), 10) || 16;
            let nbreDistr = parseInt(findTagVal('NbreDistr'), 10) || 11;
            let penetrationSplit = nbreFours - nbreDistr; // Automatically calculates the split based on the file

            const container = document.getElementById('hmiContainer');
            container.innerHTML = `<div class="hmi-layout"><div class="hmi-panel"><div class="hmi-panel-header">LAMP SET-UP</div><div class="lamp-container" id="grid"></div></div></div>`;
            const grid = document.getElementById('grid');

            // Draw Background Splits accurately
            grid.innerHTML += `<div class="bg-layer bg-penetration" style="grid-column: 2 / span ${penetrationSplit};"></div>`;
            grid.innerHTML += `<div class="bg-layer bg-distribution" style="grid-column: ${2 + penetrationSplit} / span ${16 - penetrationSplit};"></div>`;

            // Draw Headers
            grid.innerHTML += `<div></div>`;
            for(let o=1; o<=16; o++) grid.innerHTML += `<div class="col-header">${o}</div>`;
            grid.innerHTML += `<div>%</div>`;

            // Draw Rows
            for (let z = 9; z >= 1; z--) {
                grid.innerHTML += `<div class="grid-row-label">${z}</div>`;
                for (let o = 1; o <= 16; o++) {
                    let isLampOn = checkLamp(z, o);
                    let isPenetration = (o <= penetrationSplit);
                    let color = isLampOn ? (isPenetration ? 'yellow' : 'orange') : 'off';
                    grid.innerHTML += `<div class="lamp ${color}"></div>`;
                }
                grid.innerHTML += `<div class="grid-row-pct">${findTagVal('PourcentageZone'+z)}%</div>`;
            }
        }
        
        function checkLamp(z, o) { 
            let mask = parseInt(findTagVal('RetourEtatLampeFour'+o), 10);
            return (mask & (1 << (z - 1))) !== 0;
        }
        
        function findTagVal(tag) { /* ... standard parser ... */ }
    </script>
</body>
</html>
