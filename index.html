<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sidel HMI Pro - Master Configuration</title>
    <style>
        :root {
            --bg-main: #2b3e50;
            --panel-bg: #4fb2e8;
            --panel-inner: #d4e8f9;
            --header-bg: linear-gradient(to bottom, #4a77a8, #2b4f76);
            --text-dark: #1a3450;
            --split-line: #1a3450;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-main); color: var(--text-dark); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: var(--header-bg); color: white; padding: 10px 20px; font-size: 1.2rem; font-weight: bold; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #1a3450; }
        .upload-area { background-color: #fff; padding: 10px 20px; border-bottom: 1px solid #9fb2c0; display: flex; gap: 15px; }
        .dashboard { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 220px; background-color: #fff; border-right: 1px solid #9fb2c0; overflow-y: auto; }
        .nav-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #eee; font-weight: bold; }
        .nav-item.active { background: var(--header-bg); color: white; }
        .main-content { flex: 1; padding: 20px; overflow-y: auto; }

        .hmi-layout { display: flex; flex-direction: column; gap: 20px; margin-top: 30px; background-color: var(--panel-bg); padding: 20px; border-radius: 8px; }
        .hmi-panel { background: var(--panel-inner); border: 2px solid var(--border); border-radius: 12px; padding: 15px; }
        .hmi-panel-header { font-weight: bold; text-transform: uppercase; border-bottom: 2px solid var(--border); margin-bottom: 10px; text-align: center; }

        /* TABLE MATRIX - FORCED RIGIDITY */
        .matrix-table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
        .matrix-table td { padding: 2px; text-align: center; border: none; }
        .matrix-table th { color: #1a3450; font-size: 0.8rem; cursor: pointer; border-bottom: 2px solid var(--border); }
        
        /* THE DYNAMIC SPLIT */
        .pen { background-color: #6a95c2; }
        .dist { background-color: #8eb5db; }
        .split { border-right: 3px solid var(--split-line); }

        .lamp { height: 14px; border: 1px solid #555; border-radius: 2px; cursor: pointer; width: 100%; box-shadow: inset 1px 1px 2px rgba(0,0,0,0.3); }
        .yellow { background-color: #ffea00; border-color: #cca400; box-shadow: 0 0 4px #ffea00; }
        .orange { background-color: #ff7700; border-color: #c75500; box-shadow: 0 0 4px #ff7700; }
        .off { background-color: #ffffff; }
    </style>
</head>
<body>
    <header><div>SIDEL HMI PRO</div><div id="recipeName">No File Loaded</div></header>
    <div class="upload-area"><input type="file" id="fileInput" onchange="loadFile()" /></div>
    <div class="dashboard">
        <div class="sidebar" id="sidebar"></div>
        <div class="main-content"><div id="hmiContainer"></div></div>
    </div>
    <script>
        let rowSplits = JSON.parse(localStorage.getItem('sidelRowSplits')) || {9:5, 8:5, 7:5, 6:5, 5:5, 4:5, 3:5, 2:5, 1:5};
        let yellowSockets = JSON.parse(localStorage.getItem('sidelYellowSockets')) || [];

        function toggleSocket(z, o) {
            let socketId = `${z}-${o}`;
            // If in Distribution Zone, don't allow Yellow
            if (o > rowSplits[z]) return;

            if (yellowSockets.includes(socketId)) {
                yellowSockets = yellowSockets.filter(id => id !== socketId);
            } else {
                yellowSockets.push(socketId);
            }
            localStorage.setItem('sidelYellowSockets', JSON.stringify(yellowSockets));
            renderVisualHMI();
        }

        // ... (Include your existing buildRecipeData and processData logic here)

        function renderVisualHMI() {
            const container = document.getElementById('hmiContainer');
            container.innerHTML = `<div class="hmi-layout"><div class="hmi-panel"><div class="hmi-panel-header">LAMP SET-UP</div><div id="gridWrapper"></div></div></div>`;
            
            let html = '<table class="matrix-table"><thead><tr><th></th>';
            for(let o=1; o<=16; o++) html += `<th>${o}</th>`;
            html += '</tr></thead><tbody>';

            for (let z = 9; z >= 1; z--) {
                html += `<tr><td style="font-weight:bold; text-align:right;">${z}</td>`;
                for (let o = 1; o <= 16; o++) {
                    let isPenetration = (o <= rowSplits[z]);
                    let splitClass = (o === rowSplits[z]) ? 'split' : '';
                    let colorClass = isPenetration ? (yellowSockets.includes(`${z}-${o}`) ? 'yellow' : 'orange') : 'orange';
                    
                    // Recipe check: If bitmask says OFF, force white
                    if (!checkLamp(z, o)) colorClass = 'off';
                    
                    html += `<td class="${isPenetration ? 'pen' : 'dist'} ${splitClass}">
                                <div class="lamp ${colorClass}" onclick="toggleSocket(${z}, ${o})"></div>
                             </td>`;
                }
                html += `</tr>`;
            }
            document.getElementById('gridWrapper').innerHTML = html + '</tbody></table>';
        }

        function checkLamp(z, o) { 
            let mask = parseInt(findTagVal('RetourEtatLampeFour'+o), 10) || 0;
            return (mask & (1 << (z - 1))) !== 0;
        }
        
        function findTagVal(tag) { /* ... same engine as before ... */ }
    </script>
</body>
</html>
