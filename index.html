<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sidel HMI Pro</title>
    <style>
        :root {
            --hmi-bg: #2b3e50;
            --panel-bg: #d4e0e8;
            --panel-border: #9fb2c0;
            --blue-gradient: linear-gradient(to bottom, #4a77a8, #2b4f76);
            --lamp-on: #ff9d00;
            --lamp-off: #a0aec0;
            --text-main: #1a3450;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--hmi-bg);
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 200px;
            background: var(--blue-gradient);
            color: white;
            padding: 10px;
        }
        .nav-item {
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-weight: 600;
        }
        .nav-item.active { background: #1a3450; }

        /* Main Display */
        .main-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        /* Industrial Panels */
        .hmi-frame {
            background: var(--panel-bg);
            border: 4px solid var(--panel-border);
            border-radius: 4px;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .hmi-title {
            background: var(--blue-gradient);
            color: white;
            padding: 8px;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        /* Grid Layout */
        .oven-grid {
            display: grid;
            grid-template-columns: 40px repeat(16, 1fr) 50px;
            gap: 4px;
            align-items: center;
        }

        .lamp {
            width: 14px;
            height: 14px;
            border-radius: 2px;
            border: 1px solid #777;
        }
        .on { background-color: var(--lamp-on); box-shadow: 0 0 8px var(--lamp-on); }
        .off { background-color: var(--lamp-off); }

        .progress-track {
            background: #bcc;
            height: 10px;
            border: 1px inset #666;
            width: 100%;
        }
        .progress-fill {
            background: var(--lamp-on);
            height: 100%;
        }

        .data-input {
            margin-bottom: 20px;
            background: white;
            padding: 10px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar"></div>
    <div class="main-content">
        <div class="data-input">
            <input type="file" id="fileInput" onchange="loadFile()" />
        </div>
        <div id="hmiContainer" class="hmi-frame">
            <div class="hmi-title" id="hmiTitle">oven configuration</div>
            <div id="ovenDisplay" class="oven-grid"></div>
        </div>
    </div>

    <script>
        let recipeData = {};

        function loadFile() {
            const file = document.getElementById('fileInput').files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                // Simplified parser for demo
                const text = new TextDecoder('windows-1252').decode(e.target.result);
                parseText(text);
            };
            reader.readAsArrayBuffer(file);
        }

        function parseText(text) {
            // Placeholder logic to populate recipeData
            // In your production file, this calls the buildRecipeData function
            renderOven();
        }

        function renderOven() {
            const container = document.getElementById('ovenDisplay');
            container.innerHTML = '';
            
            // Header
            container.innerHTML += '<div></div>';
            for(let i=1; i<=16; i++) container.innerHTML += `<div>${i}</div>`;
            container.innerHTML += '<div>%</div>';

            // Rows
            for(let z=9; z>=1; z--) {
                container.innerHTML += `<div style="font-weight:bold;">${z}</div>`;
                for(let o=1; o<=16; o++) {
                    container.innerHTML += `<div class="lamp ${Math.random() > 0.5 ? 'on' : 'off'}"></div>`;
                }
                container.innerHTML += `<div style="text-align:right;">${(z*10)}%</div>`;
            }
        }
        renderOven();
    </script>
</body>
</html>
