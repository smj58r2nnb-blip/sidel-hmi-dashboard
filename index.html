<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sidel HMI Pro - Master Configuration</title>
    <style>
        /* ... keep your existing root and basic styles ... */

        /* Lamp Grid */
        .lamp-panel { flex: 0.6; }
        .grid-container { 
            display: grid; 
            /* Added a tiny column (minmax) specifically for the split line */
            grid-template-columns: 30px repeat(5, 1fr) 2px repeat(11, 1fr) 45px; 
            gap: 5px; 
            padding: 10px 15px 15px 15px; 
            align-items: center; 
            position: relative; 
        }
        
        /* The Split Line */
        .split-line {
            grid-column: 7; /* Placed exactly between column 5 and 6 */
            grid-row: 2 / span 9;
            background-color: #1a3450;
            width: 2px;
            z-index: 10;
        }

        /* Adjusted Backgrounds to stop at the split line */
        .bg-penetration { 
            grid-column: 2 / span 5; 
            grid-row: 2 / span 9;
            background-color: #5d8ab9; 
            border-radius: 6px 0 0 6px; 
            z-index: 0;
        }
        .bg-distribution { 
            grid-column: 8 / span 11; 
            grid-row: 2 / span 9;
            background-color: #8eb5db; 
            border-radius: 0 6px 6px 0; 
            z-index: 0;
        }

        /* Rest of your styles remain the same */
        .lamp { height: 12px; border: 1px solid #555; border-radius: 2px; z-index: 3; cursor: pointer; }
        .col-header { font-size: 0.8rem; font-weight: bold; text-align: center; z-index: 2; }
    </style>
</head>
<body>
    <script>
        // In renderVisualHMI(), update the gridHtml logic:
        function renderVisualHMI() {
            let gridHtml = '';
            
            // 1. Draw the split line pillar
            gridHtml += `<div class="split-line"></div>`;
            
            // 2. Draw backgrounds
            gridHtml += `<div class="bg-penetration"></div>`;
            gridHtml += `<div class="bg-distribution"></div>`;

            // 3. Draw headers (Adjusting column spans for the new split-line column)
            // ... logic to draw lamps with grid-column: o + (o > 5 ? 2 : 1) ...
        }
    </script>
</body>
</html>
